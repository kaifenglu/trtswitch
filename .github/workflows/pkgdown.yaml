name: Build and deploy pkgdown site

permissions:
  contents: write
  pages: write

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev pandoc

      - name: Install helper R packages
        run: |
          Rscript -e 'install.packages("remotes", repos = "https://cloud.r-project.org")'

      - name: Install package dependencies
        run: |
          # install all package dependencies declared in DESCRIPTION
          Rscript -e 'remotes::install_deps(dependencies = TRUE)'

      - name: Ensure pkgdown is installed
        run: |
          Rscript -e 'if (!requireNamespace("pkgdown", quietly = TRUE)) install.packages("pkgdown", repos = "https://cloud.r-project.org")'

      - name: Build pkgdown site
        run: |
          Rscript -e 'pkgdown::build_site()'

      - name: Deploy to GitHub Pages (publish docs/)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy pkgdown site"
